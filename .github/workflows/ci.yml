name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
    - name: Build
      run: |
        cmake -E make_directory build/x64
        cmake -E make_directory build/Win32
        cd build/x64
        cmake -A x64 ../../
        cmake --build . --config RelWithDebInfo
        cd ../../build/Win32
        cmake -A Win32 ../../
        cmake --build . --config RelWithDebInfo
    - name: Copy to dist
      run: |
        cmake -E make_directory dist
        cmake -E copy build/x64/RelWithDebInfo/rcedit.exe dist/rcedit-x64.exe 
        cmake -E copy build/Win32/RelWithDebInfo/rcedit.exe dist/rcedit-x86.exe 
    - name: Print help
      shell: bash
      run: |
        set -eo pipefail
        dist/rcedit-x86.exe -h
        dist/rcedit-x64.exe -h
    - name: Upload artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dist
        path: dist/

  release:
    name: Release
    runs-on: windows-2022
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write # for making github release
      pull-requests: write # for commenting release version
      issues: write # for commenting release version
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download dist
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist/
      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20
          cache: npm
      - name: Install semantic-release plugins
        run: npm ci
      - name: Run semantic release
        uses: electron/semantic-trusted-release@03517840010ba30fe5264f4875f4cff066b658d1 # v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
